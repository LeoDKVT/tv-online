<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Player</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-dark">
    <p>ola mundo</p>
    <h1>teste</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Quae explicabo, nihil aliquid culpa porro saepe!
        Incidunt at accusantium maiores consectetur esse, quidem, adipisci nemo iure, magni recusandae sequi sunt
        labore!</p>
    <iframe name="Player" src="https://redecanaistv.ooo/player3/ch.php?canal=espn3" allow="encrypted-media"
        allowfullscreen></iframe>



    <nav class="navbar navbar-dark bg-black border-bottom border-secondary mb-4">
        <div class="container-fluid justify-content-center">
            <span class="navbar-brand mb-0 h1 fw-bold text-white">📺 Canais Disponíveis</span>
        </div>
    </nav>

    <div class="container">
        <div class="row g-3">

            <div class="col-6 col-md-4 col-lg-3">
                <button class="btn canal-btn w-100 p-3 d-flex flex-column align-items-center"
                    onclick="abrirCanal('espn3', 'ESPN 3')">
                    <img src="/img/ESPN3_logo.svg"
                        class="canal-logo" alt="ESPN 3">
                    <span class="fw-bold text-white">ESPN 3</span>
                </button>
            </div>

            <div class="col-6 col-md-4 col-lg-3">
                <button class="btn canal-btn w-100 p-3 d-flex flex-column align-items-center"
                    onclick="abrirCanal('sportv', 'SporTV')">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e3/SporTV_logo.svg/512px-SporTV_logo.svg.png"
                        class="canal-logo" alt="SporTV">
                    <span class="fw-bold text-white">SporTV</span>
                </button>
            </div>

            <div class="col-6 col-md-4 col-lg-3">
                <button class="btn canal-btn w-100 p-3 d-flex flex-column align-items-center"
                    onclick="abrirCanal('premiere', 'Premiere')">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/ef/Premiere_logo.svg/512px-Premiere_logo.svg.png"
                        class="canal-logo" alt="Premiere">
                    <span class="fw-bold text-white">Premiere</span>
                </button>
            </div>

        </div>
    </div>

    <div class="modal fade" id="playerModal" data-bs-backdrop="static" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-fullscreen">
            <div class="modal-content bg-black">

                <div class="modal-header border-secondary p-2">
                    <h5 class="modal-title fs-6 text-white" id="nomeDoCanal">Assistindo</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"
                        onclick="fecharCanal()"></button>
                </div>

                <div class="modal-body p-0">
                    <iframe id="telaDoPlayer" src="" allow="encrypted-media" allowfullscreen
                        style="width: 100%; height: 100%; border: none;"></iframe>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmxc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

    <script>
        // Instancia o modal do Bootstrap para podermos abri-lo pelo JavaScript
        const modalPlayer = new bootstrap.Modal(document.getElementById('playerModal'));

        // Função que é chamada quando você clica em um botão
        function abrirCanal(idCanal, nomeCanal) {
            // 1. Muda o título da barrinha do player
            document.getElementById('nomeDoCanal').innerText = "Assistindo: " + nomeCanal;
            
            // 2. Constrói o link direto daquele canal específico
            const linkDireto = "https://redecanaistv.ooo/player3/ch.php?canal=" + idCanal;
            
            // 3. Coloca o link dentro do iframe
            document.getElementById('telaDoPlayer').src = linkDireto;
            
            // 4. Mostra o player na tela
            modalPlayer.show();
        }

        // Função que é chamada quando você clica no "X" para fechar o vídeo
        function fecharCanal() {
            // Limpa o iframe para o áudio/vídeo parar de tocar no fundo
            document.getElementById('telaDoPlayer').src = "";
        }
    </script>
</body>

</html>
